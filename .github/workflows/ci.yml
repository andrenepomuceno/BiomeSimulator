name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /BiomeSimulator/
        run: npm run build

      - name: Unit and regression tests
        run: npm run test:run

      - name: Performance gate (small)
        run: npm run test:perf:small

      - name: Performance gate (medium)
        run: npm run test:perf:medium
